# Deploy VitePress to GitHub Pages
#
# FIRST TIME (pick one):
# A) UI: Repo → Settings → Pages → Build and deployment → Source → GitHub Actions → Save
# B) PAT: Add repo secret PAGES_ENABLE_TOKEN (classic PAT, scope: repo). Then enablement runs below.

name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # Without a Pages site + "GitHub Actions" source, GET /pages returns 404 and this action fails.
      # Optional secret PAGES_ENABLE_TOKEN (not GITHUB_TOKEN): PAT with `repo` lets enablement: true auto-enable Pages.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_ENABLE_TOKEN != '' && secrets.PAGES_ENABLE_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_ENABLE_TOKEN != '' }}

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
